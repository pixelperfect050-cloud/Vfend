    name: antig-backend
    env: node
    region: oregon
    rootDir: artflow-studio/server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://pixelperfect050_db_user:PixelPerfect050@cluster0.4v6flij.mongodb.net/?appName=Cluster0
      - key: JWT_SECRET
        value: artflow_studio_jwt_secret_2024_xK9mP2
      - key: DEFAULT_ADMIN_PASSWORD
        value: admin123
      - key: CLIENT_URL
        value: https://artflow-live.vercel.app
      - key: RENDER_EXTERNAL_URL
        value: https://antig-backend-ingm.onrender.com
      - key: NODE_ENV
        value: production
  - type: web
    name: society-app-api
    env: node
    region: oregon
    rootDir: society-app/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
